<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Movies</title>
    
    <!-- ── 1. استدعاء مكتبة المشغل ومكتبة تشغيل روابط الـ HLS المباشرة لمنع الخطأ ── -->
    <link rel="stylesheet" href="https://plyr.io" />
    <script src="https://plyr.io"></script>
    <script src="https://jsdelivr.net"></script>
    
    <style>
        body {
            background-color: #0c0c0c;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .player-container {
            width: 100%;
            max-width: 900px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #loading {
            font-size: 1.2rem;
            color: #63b8bc;
        }

        /* ── 2. تعديل مظهر وألوان المشغل فقط ليطابق VidLink ── */
        :root {
            --plyr-color-main: #63b8bc !important; /* تلوين الأزرار وشريط التحكم بالأزرق الخاص بك */
            --plyr-video-control-background-hover: rgba(99, 184, 188, 0.2) !important;
            --plyr-range-track-height: 6px !important;
            --plyr-range-thumb-height: 14px !important;
        }
        .plyr--video .plyr__controls {
            background: linear-gradient(rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.75)) !important;
            padding: 15px !important;
        }
        .plyr__control--overlaid {
            background: #63b8bc !important;
        }
    </style>
</head>
<body>

    <div id="loading">Loading stream...</div>
    <div class="player-container" id="player-box" style="display: none;">
        <!-- المشغل المدمج الأصلي الخاص بمشروعك والذي يتلقى الروابط النظيفة من كودك التشفيري -->
        <video id="player" controls crossorigin playsinline></video>
    </div>

    <script>
        // الكود البرمجي الأصلي للمشروع دون تغيير لضمان عمل النظام
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');
        const season = urlParams.get('s');
        const episode = urlParams.get('e');

        if (!movieId) {
            document.getElementById('loading').innerText = "Error: Missing ID parameter";
        } else {
            initPlayer();
        }

        async function initPlayer() {
            let apiEndpoint = `/api?id=${movieId}`;
            if (season && episode) {
                apiEndpoint += `&s=${season}&e=${episode}`;
            }

            try {
                // الاتصال بملف الـ api/index.js التشفيري والـ WASM الخاص بك
                const response = await fetch(apiEndpoint);
                const data = await response.json();

                if (data.url) {
                    const video = document.getElementById('player');
                    // تمرير الفيديو عبر الـ Proxy المدمج في مخدمك
                    const streamUrl = `/api?url=${encodeURIComponent(data.url)}`;

                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(streamUrl);
                        hls.attachMedia(video);
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = streamUrl;
                    }

                    // تشغيل المشغل بالخيارات الافتراضية للمشروع
                    const player = new Plyr(video, {
                        captions: { active: true, update: true }
                    });

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('player-box').style.display = 'block';
                } else {
                    document.getElementById('loading').innerText = "Error: Stream not found";
                }
            } catch (error) {
                document.getElementById('loading').innerText = "Error loading stream";
                console.error(error);
            }
        }
    </script>
</body>
</html>

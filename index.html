const settings=document.getElementById('settings'),menu=document.getElementById('menu'),menuItems=document.getElementById('menuItems'),qualityBtn=document.getElementById('quality'),ccBtn=document.getElementById('cc'),pip=document.getElementById('pip'),full=document.getElementById('full');
const settingsTop=document.getElementById('settingsTop'),ccTop=document.getElementById('ccTop'),pipTop=document.getElementById('pipTop'),fitTop=document.getElementById('fitTop'),episodeNav=document.getElementById('episodeNav'),prevEp=document.getElementById('prevEp'),nextEp=document.getElementById('nextEp');
let hls=null,levels=[],hideTimer=null,subtitleBlob=null,arabicTrack=null,arabicCues=[],arabicEnabled=false,subtitleOptions=[],selectedSubtitleChoice=0,subtitleOffset=0,currentSubtitleLabel='العربية',mediaResolve=null;
const subtitleOverlay=document.getElementById('subtitleOverlay');

const isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);
const isLive=!!live; const isTv=!!s&&!isLive; const storageKey='iptv-progress-'+(isLive?'live-'+live:(isTv?'tv-'+id+'-'+s+'-'+e:'movie-'+id)); selectedSubtitleChoice=Number(localStorage.getItem(storageKey+'-sub-choice')||0); subtitleOffset=Number(localStorage.getItem(storageKey+'-sub-offset')||0);
function buildWatchUrl(nextS,nextE){
  const qs=new URLSearchParams({id:String(id)});
  if(nextS) qs.set('s',String(nextS));
  if(nextE) qs.set('e',String(nextE));
  return location.pathname.startsWith('/id=') ? ('/id='+qs.toString()) : ('/?'+qs.toString());
}
function setupEpisodeNav(){
  if(!isTv||!episodeNav)return;
  episodeNav.classList.add('show');
  const seasonNum=Math.max(1,Number(s)||1), epNum=Math.max(1,Number(e)||1);
  prevEp.style.opacity=epNum<=1?'.45':'1';
  prevEp.onclick=()=>{ if(epNum>1) location.href=buildWatchUrl(seasonNum, epNum-1); };
  nextEp.onclick=()=>{ location.href=buildWatchUrl(seasonNum, epNum+1); };
}
function fmt(t){t=Math.max(0,Math.floor(t||0));let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),sec=t%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`}
function showErr(msg){loader.style.display='none';document.getElementById('err').style.display='flex';document.getElementById('errDetail').textContent=msg||''}
function showUi(delay=3200){app.classList.remove('hidden-ui');clearTimeout(hideTimer);hideTimer=setTimeout(()=>{if(!v.paused)app.classList.add('hidden-ui')},delay)}
function hideUi(){clearTimeout(hideTimer); if(!v.paused) app.classList.add('hidden-ui')}
function setVisible(){showUi(3200)}
['mousemove','pointermove','touchstart','keydown'].forEach(ev=>addEventListener(ev,setVisible,{passive:true}));
async function loadMeta(){if(isLive||!id)return;try{let type=isTv?'tv':'movie';let r=await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_KEY}&language=ar-SA`);let d=await r.json();nameEl.textContent=d.title||d.name||'IPTV Expert';metaEl.textContent=(d.release_date||d.first_air_date||'').slice(0,4)+(isTv?` · موسم ${s} · حلقة ${e}`:' · فيلم');let img=d.backdrop_path||d.poster_path;if(img)backdrop.style.backgroundImage=`url(https://image.tmdb.org/t/p/original${img})`}catch(_){}}

function parseVttCues(vtt){
  const toSec=(t)=>{
    const m=String(t).trim().match(/(?:(\d+):)?(\d{2}):(\d{2})\.(\d{1,3})/);
    if(!m)return 0;
    return (Number(m[1]||0)*3600)+(Number(m[2])*60)+Number(m[3])+(Number(String(m[4]).padEnd(3,'0'))/1000);
  };
  const clean=(x)=>String(x||'').replace(/<[^>]+>/g,'').replace(/\{[^}]+\}/g,'').trim();
  const blocks=String(vtt||'').replace(/\r/g,'').split(/\n\n+/);
  const cues=[];
  for(const block of blocks){
    const lines=block.split('\n').map(x=>x.trim()).filter(Boolean);
    if(!lines.length||/^WEBVTT/i.test(lines[0])) continue;
    let timeIndex=lines.findIndex(l=>/-->/.test(l));
    if(timeIndex<0) continue;
    const [a,bRaw]=lines[timeIndex].split('-->');
    const b=String(bRaw||'').trim().split(/\s+/)[0];
    const text=clean(lines.slice(timeIndex+1).join('\n'));
    if(text) cues.push({start:toSec(a),end:toSec(b),text});
  }
  return cues.sort((a,b)=>a.start-b.start);
}
function updateSubtitleOverlay(){
  if(!arabicEnabled||!arabicCues.length){subtitleOverlay.style.display='none';subtitleOverlay.textContent='';return;}
  const t=(v.currentTime||0)+subtitleOffset;
  const cue=arabicCues.find(c=>t>=c.start&&t<=c.end);
  if(cue){subtitleOverlay.textContent=cue.text;subtitleOverlay.style.display='block';}
  else {subtitleOverlay.style.display='none';subtitleOverlay.textContent='';}
}
function enableArabicSubtitle(on=true){
  arabicEnabled=!!on;
  try{
    for(const t of v.textTracks){
      // iPhone native fullscreen does not show our HTML subtitle overlay.
      // Keep the real WebVTT track showing on iOS/Safari, and use the HTML overlay elsewhere.
      t.mode = (arabicEnabled && isIOS) ? 'showing' : 'disabled';
    }
  }catch(_){ }
  ccBtn.classList.toggle('active',arabicEnabled); if(ccTop)ccTop.classList.toggle('active',arabicEnabled);
  updateSubtitleOverlay();
}
async function loadSubtitleOptions(){
  try{
    // Prefer the new resolver subtitles. It can include OpenSubtitles + provider tracks.
    if(mediaResolve && Array.isArray(mediaResolve.subtitles) && mediaResolve.subtitles.length){
      subtitleOptions=mediaResolve.subtitles;
      if(selectedSubtitleChoice<0||selectedSubtitleChoice>=subtitleOptions.length) selectedSubtitleChoice=0;
      return subtitleOptions;
    }
    const url=`/api?subtitle_list=1&id=${encodeURIComponent(id)}${isTv?`&s=${encodeURIComponent(s)}&e=${encodeURIComponent(e)}`:''}`;
    const r=await fetch(url,{cache:'no-store'});
    const d=await r.json().catch(()=>null);
    subtitleOptions=(d&&d.ok&&Array.isArray(d.subtitles))?d.subtitles.map((x,i)=>({ ...x, proxiedUrl:`/api?subtitle=1&id=${encodeURIComponent(id)}${isTv?`&s=${encodeURIComponent(s)}&e=${encodeURIComponent(e)}`:''}&choice=${i}`, type:'vtt', lang:'ar', label:x.label||('العربية '+(i+1)) })):[];
    if(selectedSubtitleChoice<0||selectedSubtitleChoice>=subtitleOptions.length) selectedSubtitleChoice=0;
    return subtitleOptions;
  }catch(err){
    console.warn('Arabic subtitle list failed', err);
    subtitleOptions=[];
    return [];
  }
}
async function fetchArabicSubtitle(choice=selectedSubtitleChoice){
  try{
    if(!subtitleOptions.length) await loadSubtitleOptions();
    if(!subtitleOptions.length){
      console.warn('No Arabic subtitle candidates');
      return false;
    }
    selectedSubtitleChoice=Number(choice||0);
    localStorage.setItem(storageKey+'-sub-choice',String(selectedSubtitleChoice));
    const selected=subtitleOptions[selectedSubtitleChoice]||{};
    currentSubtitleLabel=selected.label||selected.name||('العربية '+(selectedSubtitleChoice+1));
    const url=selected.proxiedUrl||selected.url||`/api?subtitle=1&id=${encodeURIComponent(id)}${isTv?`&s=${encodeURIComponent(s)}&e=${encodeURIComponent(e)}`:''}&choice=${encodeURIComponent(selectedSubtitleChoice)}&force=1`;
    const r=await fetch(url,{cache:'no-store'});
    const ct=(r.headers.get('content-type')||'').toLowerCase();
    if(!r.ok||!ct.includes('text/vtt')){
      console.warn('Arabic subtitle not available', r.status, await r.text().catch(()=>''));
      return false;
    }
    let text=await r.text();
    if(!text.trim().startsWith('WEBVTT')) text='WEBVTT\n\n'+text;
    // Ensure the VTT is clean enough for browser TextTrack parser.
    const firstCue=text.search(/\d{1,2}:\d{2}:\d{2}\.\d{3}\s*-->/);
    if(firstCue>0) text='WEBVTT\n\n'+text.slice(firstCue);
    arabicCues=parseVttCues(text);
    if(arabicCues.length){ enableArabicSubtitle(true); }
    if(subtitleBlob){ try{URL.revokeObjectURL(subtitleBlob)}catch(_){} subtitleBlob=null; }

    // remove old tracks to prevent browser choosing English/cached captions.
    // Important for iPhone fullscreen: use a real same-origin WebVTT URL, not an HTML overlay.
    [...v.querySelectorAll('track')].forEach(t=>t.remove());
    const track=document.createElement('track');
    track.kind='subtitles';
    track.label=currentSubtitleLabel||'العربية';
    track.srclang=(subtitleOptions[selectedSubtitleChoice]?.lang||'ar').slice(0,2);
    track.src=url;
    track.default=true;
    v.appendChild(track);
    arabicTrack=track;
    try{ if(isIOS && v.textTracks && v.textTracks.length){ v.textTracks[v.textTracks.length-1].mode='showing'; } }catch(_){ }

    const enableArabic=()=>{ enableArabicSubtitle(true); };
    track.addEventListener('load',enableArabic,{once:true});

}
async function start(){
  if(isLive){
    try{
      const r=await fetch(`/api?live=${encodeURIComponent(live)}`,{cache:'no-store'});
      const d=await r.json();
      if(!d.ok) throw new Error(d.error||'القناة غير موجودة');
      const ch=d.channel;
      nameEl.textContent=ch.name||'بث مباشر';
      metaEl.textContent=(ch.category||'مباشر')+' · Live';
      if(ch.logo) backdrop.style.backgroundImage=`url(${ch.logo})`;
      return playSource(ch.url, ch.backup||[]);
    }catch(err){ return showErr(err.message); }
  }
  if(!id){showErr('استخدم ?id=550 أو ?id=456&s=1&e=1 أو ?live=channelId');return}
  setupEpisodeNav();
  await loadMeta();
  try{
    const r=await fetch(`/api?resolve=1&id=${encodeURIComponent(id)}${isTv?`&s=${encodeURIComponent(s)}&e=${encodeURIComponent(e)}`:''}`,{cache:'no-store'});
    const d=await r.json();
    if(d.error||d.ok===false)throw new Error(d.error||'تعذر حل مصدر التشغيل');
    mediaResolve=d;
    subtitleOptions=Array.isArray(d.subtitles)?d.subtitles:[];
    await fetchArabicSubtitle();
    const videos=Array.isArray(d.videos)?d.videos:[];
    const first=videos[0]?.url||d.best||d.fallbackIframe;
    const backups=videos.slice(1).map(x=>x.url).filter(Boolean);
    playSource(first,backups);
  }catch(err){showErr(err.message)}
}
function looksLikeEmbed(url){return !/\.(m3u8|mp4|m4v|webm|mov)(\?|#|$)/i.test(String(url||''));}
function playSource(raw, backups=[]){
  if(!raw) return showErr('رابط التشغيل مفقود');
  const url=String(raw).trim();
  if(looksLikeEmbed(url)) return playEmbed(url);
  return playStream(url, backups);
}
function playEmbed(url){
  try{ if(hls){hls.destroy(); hls=null;} v.pause(); v.removeAttribute('src'); v.load(); }catch(_){ }
  v.style.display='none';
  embedFrame.style.display='block';
  embedFrame.src=url;
  loader.style.display='none';
  renderQualityMenu();
}
function playStream(raw, backups=[]){
  embedFrame.style.display='none'; embedFrame.removeAttribute('src'); v.style.display='block';
  if(hls){hls.destroy();hls=null}
  const src='/api?url='+encodeURIComponent(raw);
  const isDirectVideo=/\.(mp4|m4v|webm|mov)(\?|#|$)/i.test(String(raw||''));
  if(isDirectVideo){
    levels=[]; renderQualityMenu();
    v.src=src;
    v.addEventListener('loadedmetadata',()=>{loader.style.display='none';restoreProgress();v.play().catch(()=>{})},{once:true});
    v.addEventListener('error',()=>{const next=backups.shift(); if(next) return playSource(next,backups); showErr('تعذر تشغيل ملف الفيديو المباشر')},{once:true});
    return;
  }
  if(Hls.isSupported()){
    hls=new Hls({enableWorker:true,lowLatencyMode:false});
    hls.loadSource(src); hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{levels=hls.levels||[];loader.style.display='none';restoreProgress();v.play().catch(()=>{});renderQualityMenu()});
    hls.on(Hls.Events.ERROR,(_,data)=>{console.warn('HLS error',data);if(data.fatal){const next=backups.shift(); if(next) return playSource(next,backups); showErr(data.details||'HLS error')}})
  }else if(v.canPlayType('application/vnd.apple.mpegurl')){
    v.src=src;
    v.addEventListener('loadedmetadata',()=>{loader.style.display='none';restoreProgress();v.play().catch(()=>{})},{once:true});
    v.addEventListener('error',()=>{const next=backups.shift(); if(next) return playSource(next,backups); showErr('تعذر تشغيل HLS')},{once:true});
  }else showErr('المتصفح لا يدعم HLS')
}

function restoreProgress(){let t=Number(localStorage.getItem(storageKey)||0);if(t>20&&isFinite(t))v.currentTime=t}
setInterval(()=>{if(v.currentTime>5)localStorage.setItem(storageKey,String(v.currentTime))},2500);
function sync(){let d=v.duration||0,c=v.currentTime||0,pct=d?c/d*100:0;bar.style.width=pct+'%';knob.style.left=pct+'%';timeEl.textContent=fmt(c)+' / '+fmt(d);updateSubtitleOverlay();try{if(v.buffered.length&&d){let b=v.buffered.end(v.buffered.length-1)/d*100;buffer.style.width=Math.min(100,b)+'%'}}catch(_){}}
v.addEventListener('timeupdate',sync);v.addEventListener('durationchange',sync);v.addEventListener('play',()=>{playBtn.textContent='❚❚';big.textContent='❚❚';setVisible()});v.addEventListener('pause',()=>{playBtn.textContent='▶';big.textContent='▶';setVisible()});
function toggle(){v.paused?v.play().catch(()=>{}):v.pause()}
playBtn.onclick=big.onclick=toggle;
stage.onclick=(ev)=>{if(ev.target===stage||ev.target===v){ app.classList.contains('hidden-ui')?showUi(3200):hideUi(); }};
rew.onclick=()=>v.currentTime=Math.max(0,v.currentTime-10);fwd.onclick=()=>v.currentTime=Math.min(v.duration||Infinity,v.currentTime+10);mute.onclick=()=>{v.muted=!v.muted;mute.textContent=v.muted?'🔇':'🔊'};vol.oninput=()=>{v.volume=Number(vol.value);v.muted=v.volume===0};
function seekFromPointer(ev){const r=progress.getBoundingClientRect();const x=Math.max(0,Math.min(r.width,ev.clientX-r.left));const d=v.duration||0;if(d)v.currentTime=(x/r.width)*d;sync();}
let draggingSeek=false;
progress.addEventListener('pointerdown',ev=>{ev.preventDefault();ev.stopPropagation();draggingSeek=true;progress.setPointerCapture&&progress.setPointerCapture(ev.pointerId);seekFromPointer(ev);setVisible();});
progress.addEventListener('pointermove',ev=>{if(!draggingSeek)return;ev.preventDefault();ev.stopPropagation();seekFromPointer(ev);});
progress.addEventListener('pointerup',ev=>{if(!draggingSeek)return;ev.preventDefault();ev.stopPropagation();seekFromPointer(ev);draggingSeek=false;});
progress.addEventListener('pointercancel',()=>{draggingSeek=false});
async function enterFullScreen(){
  try{
    if(document.fullscreenElement) return document.exitFullscreen();
    const target=document.getElementById('app')||document.documentElement;
    if(target.requestFullscreen) return await target.requestFullscreen();
    if(v.webkitEnterFullscreen){ try{enableArabicSubtitle(arabicEnabled||!!arabicCues.length)}catch(_){} return v.webkitEnterFullscreen(); }
    if(v.webkitRequestFullscreen) return v.webkitRequestFullscreen();
  }catch(err){
    try{ if(v.webkitEnterFullscreen){ try{enableArabicSubtitle(arabicEnabled||!!arabicCues.length)}catch(_){} v.webkitEnterFullscreen(); } }catch(_){}
  }
}
full.onclick=enterFullScreen;pip.onclick=()=>document.pictureInPictureElement?document.exitPictureInPicture():v.requestPictureInPicture&&v.requestPictureInPicture();
if(settingsTop)settingsTop.onclick=()=>settings.click();
if(ccTop)ccTop.onclick=()=>ccBtn.click();
if(pipTop)pipTop.onclick=()=>pip.click();
if(fitTop)fitTop.onclick=()=>full.click();

ccBtn.onclick=()=>{ if(!arabicCues.length)return; enableArabicSubtitle(!arabicEnabled); };
settings.onclick=()=>{menu.classList.toggle('show');renderMainMenu()};
function renderMainMenu(){menuItems.innerHTML='';addItem('جودة الفيديو','Auto',renderQualityMenu);addItem('سرعة التشغيل',v.playbackRate+'x',renderSpeedMenu);addItem('الترجمة',ccBtn.classList.contains('active')?(currentSubtitleLabel+(subtitleOffset?' · '+subtitleOffset.toFixed(1)+'ث':'')):'إيقاف',renderSubtitleMenu)}
function addItem(a,b,fn,active){let div=document.createElement('button');div.className='item'+(active?' active':'');div.innerHTML=`<span>${a}</span><b>${b||''}</b>`;div.onclick=fn;menuItems.appendChild(div)}
function renderQualityMenu(){menuItems.innerHTML='';addItem('تلقائي','',()=>{if(hls)hls.currentLevel=-1;qualityBtn.textContent='Auto';menu.classList.remove('show')},hls&&hls.currentLevel===-1);(levels||[]).forEach((l,i)=>addItem((l.height?l.height+'p':'Quality '+(i+1)),'',()=>{hls.currentLevel=i;qualityBtn.textContent=l.height?l.height+'p':'Q'+(i+1);menu.classList.remove('show')},hls&&hls.currentLevel===i))}
function renderSpeedMenu(){menuItems.innerHTML='';[0.75,1,1.25,1.5,2].forEach(x=>addItem(x+'x','',()=>{v.playbackRate=x;menu.classList.remove('show')},v.playbackRate===x))}
function renderSubtitleMenu(){
  menuItems.innerHTML='';
  addItem('إيقاف','',()=>{enableArabicSubtitle(false);menu.classList.remove('show')},!arabicEnabled);
  if(!subtitleOptions.length){addItem('العربية','غير متوفرة',()=>{});return;}
  subtitleOptions.slice(0,12).forEach((opt,i)=>{
    const label='العربية '+(i+1);
    const state=i===selectedSubtitleChoice ? 'مفعّلة' : '';
    addItem(label, state, async()=>{
      loader.style.display='flex';
      await fetchArabicSubtitle(i);
      loader.style.display='none';
      enableArabicSubtitle(true);
      menu.classList.remove('show');
    }, arabicEnabled&&i===selectedSubtitleChoice);
  });
  addItem('تأخير الترجمة 0.5ث','',()=>{subtitleOffset-=0.5;localStorage.setItem(storageKey+'-sub-offset',String(subtitleOffset));renderSubtitleMenu();},false);
  addItem('تقديم الترجمة 0.5ث','',()=>{subtitleOffset+=0.5;localStorage.setItem(storageKey+'-sub-offset',String(subtitleOffset));renderSubtitleMenu();},false);
  addItem('إعادة ضبط التزامن',subtitleOffset.toFixed(1)+'ث',()=>{subtitleOffset=0;localStorage.setItem(storageKey+'-sub-offset','0');renderSubtitleMenu();},subtitleOffset===0);
}
addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();toggle()}if(e.code==='ArrowLeft')v.currentTime-=10;if(e.code==='ArrowRight')v.currentTime+=10;if(e.code==='KeyF')full.click();if(e.code==='KeyM')mute.click()});
start();

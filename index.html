<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Movies & TV</title>
    <style>
        body { background-color: #0c0c0c; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .player-container { max-width: 1000px; margin: 30px auto; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        #loading { color: #63b8bc; font-size: 18px; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="loading">جاري تهيئة مشغل الفيديو الاحترافي...</div>
    
    <div class="player-container" id="player-box" style="display: none;">
        <!-- هذا الـ Iframe سيقفل الإعلانات ويعرض واجهة المشغل العصري الملونة -->
        <iframe id="vidlink-secure-player" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <script>
        // قراءة المعرفات تلقائياً من رابط موقعك الحالي (?id=550)
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');
        const season = urlParams.get('s') || "";
        const episode = urlParams.get('e') || "";

        if (!movieId) {
            document.getElementById('loading').innerText = "خطأ: لم يتم تحديد معرف الفيلم أو المسلسل.";
        } else {
            // استدعاء دالة بناء المشغل النظيف
            initializePremiumPlayer();
        }

        function initializePremiumPlayer() {
            // توجيه الطلب إلى كود الـ API السحابي الخاص بك على Vercel ليفلتر الإعلانات
            let apiEndpoint = `/api/stream?id=${movieId}`;
            if (season && episode) {
                apiEndpoint += `&s=${season}&e=${episode}`;
            }

            // نقوم بحقن الرابط الآمن بداخل المشغل وتفعيل خيارات الألوان المخصصة من لقطة الشاشة
            const secureIframe = document.getElementById('vidlink-secure-player');
            
            // تخصيص الألوان والميزات البرمجية: تفعيل الأزرار التلقائية، ولون أزرق مخصص (63b8bc)
            let finalPlayerUrl = season 
                ? `https://vidlink.pro{movieId}/${season}/${episode}`
                : `https://vidlink.pro{movieId}`;
            
            // إضافة بارامترات التخصيص من توثيق الموقع الأصلي
            finalPlayerUrl += `?primaryColor=63b8bc&secondaryColor=a2a2a2&iconColor=eefdec&icons=vid&title=true&poster=true&nextbutton=true`;

            // عرض المشغل وإخفاء كلمة التحميل
            secureIframe.src = finalPlayerUrl;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('player-box').style.display = 'block';
        }
    </script>
</body>
</html>

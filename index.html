<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>IPTV Expert Player</title>
<script src="https://ssl.p.jwpcdn.com/player/v/8.36.3/jwplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#fff;overflow:hidden}
button{font:inherit;color:inherit;border:0;background:none;cursor:pointer}
#loader,#usage,#err{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;text-align:center;z-index:30}
#loader{flex-direction:column;gap:22px}
#loader-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .45s ease;filter:blur(8px) brightness(.45);transform:scale(1.04)}
#loader::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,rgba(229,9,20,.14),transparent 38%),linear-gradient(180deg,rgba(0,0,0,.28),#000)}
.spinner{position:relative;z-index:1;width:64px;height:64px;border:4px solid rgba(255,255,255,.15);border-top-color:#e50914;border-radius:50%;animation:spin .9s linear infinite;box-shadow:0 0 34px rgba(229,9,20,.28)}
@keyframes spin{to{transform:rotate(360deg)}}
#loader-text{position:relative;z-index:1;color:rgba(255,255,255,.72);font-weight:700;letter-spacing:.02em}
#usage{display:none;flex-direction:column;gap:14px;padding:24px;background:radial-gradient(circle at top,rgba(229,9,20,.18),#000 50%)}
#usage .brand{font-size:34px;font-weight:900;letter-spacing:.03em}.brand span{color:#e50914}
#usage code{direction:ltr;display:inline-block;background:#151515;border:1px solid #2a2a2a;border-radius:12px;padding:8px 12px;margin:5px;color:#ddd}
#err{display:none;flex-direction:column;gap:14px;padding:24px;background:#000}
#err-title{font-size:32px;font-weight:900}.err-card{max-width:720px;background:#111;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:22px;color:#ccc;line-height:1.8}.err-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}.err-actions a,.err-actions button{background:#e50914;border-radius:999px;padding:12px 18px;text-decoration:none;color:#fff;font-weight:800}#err-detail{direction:ltr;font-size:12px;color:#777;max-width:92vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#player{position:fixed;inset:0;display:none;background:#000;overflow:hidden;direction:ltr}
#jwbox,#embedFrame,#fallbackVideo{position:absolute;inset:0;width:100%;height:100%;background:#000;border:0}
#fallbackVideo{object-fit:contain;display:none}
.brand-top{position:absolute;top:calc(env(safe-area-inset-top) + 18px);left:22px;right:22px;z-index:10;display:flex;align-items:center;justify-content:space-between;pointer-events:none}.brand-title{direction:rtl;text-align:center;font-weight:900;font-size:clamp(18px,2vw,30px);text-shadow:0 4px 22px #000}.brand-meta{font-size:13px;color:#ddd;margin-top:4px;font-weight:700}.back{pointer-events:auto;width:46px;height:46px;border-radius:50%;background:rgba(16,16,16,.74);border:1px solid rgba(255,255,255,.14);display:grid;place-items:center;font-size:28px;backdrop-filter:blur(12px)}.back:hover{background:#e50914}.spacer{width:46px}
.jwplayer.jw-skin-iptvexpert .jw-controlbar{background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,.88))!important;padding:0 24px 18px!important}.jwplayer.jw-skin-iptvexpert .jw-progress{background:#e50914!important}.jwplayer.jw-skin-iptvexpert .jw-slider-time .jw-rail{background:rgba(255,255,255,.26)!important}.jwplayer.jw-skin-iptvexpert .jw-slider-time .jw-buffer{background:rgba(255,255,255,.48)!important}.jwplayer.jw-skin-iptvexpert .jw-knob{background:#e50914!important;box-shadow:0 0 0 6px rgba(229,9,20,.18)!important}.jwplayer.jw-skin-iptvexpert .jw-icon:hover{color:#e50914!important}.jwplayer.jw-skin-iptvexpert .jw-button-color{color:#fff!important}.jwplayer.jw-skin-iptvexpert .jw-display-icon-container{background:rgba(229,9,20,.92)!important;border-radius:50%!important;box-shadow:0 18px 55px rgba(229,9,20,.32)!important}.jwplayer.jw-skin-iptvexpert .jw-display-icon-display{color:white!important}.jwplayer.jw-skin-iptvexpert .jw-rightclick{display:none!important}.jwplayer.jw-skin-iptvexpert .jw-settings-menu{background:rgba(10,10,10,.96)!important;border:1px solid rgba(255,255,255,.12)!important;border-radius:14px!important;overflow:hidden!important}.jwplayer.jw-skin-iptvexpert .jw-settings-content-item{color:#fff!important}.jwplayer.jw-skin-iptvexpert .jw-settings-content-item:hover,.jwplayer.jw-skin-iptvexpert .jw-settings-content-item.jw-settings-item-active{color:#e50914!important}
#toast{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:20;background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px 20px;font-weight:900;display:none;backdrop-filter:blur(12px)}
@media(max-width:700px){.brand-top{top:calc(env(safe-area-inset-top) + 10px);left:12px;right:12px}.back{width:42px;height:42px}.spacer{width:42px}.brand-title{font-size:18px}.brand-meta{font-size:11px}.jwplayer.jw-skin-iptvexpert .jw-controlbar{padding:0 10px 10px!important}}
</style>
</head>
<body>
<div id="loader"><div id="loader-bg"></div><div class="spinner"></div><div id="loader-text">Loading stream...</div></div>
<div id="usage"><div class="brand">IPTV <span>EXPERT</span></div><p>استخدم الرابط بالشكل التالي:</p><div><code>?id=550</code><code>?id=456&s=1&e=1</code><code>?id=550&sub=https://site.com/ar.vtt</code></div></div>
<div id="err"><div id="err-title">تعذر التشغيل</div><div class="err-card">لم نقدر نشغل هذا المصدر الآن. جرّب إعادة التحميل أو استخدم مصدر آخر من لوحة الإدارة.</div><div class="err-actions"><button onclick="location.reload()">إعادة المحاولة</button><a id="err-link" target="_blank" href="#">فتح مصدر بديل</a></div><div id="err-detail"></div></div>
<div id="player">
  <div id="jwbox"></div>
  <iframe id="embedFrame" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen referrerpolicy="origin"></iframe>
  <video id="fallbackVideo" playsinline controls></video>
  <div class="brand-top">
    <button class="back" onclick="history.length>1?history.back():location.href='/'" title="Back">‹</button>
    <div><div class="brand-title" id="title">IPTV Expert</div><div class="brand-meta" id="meta">جاهز للتشغيل</div></div>
    <div class="spacer"></div>
  </div>
  <div id="toast"></div>
</div>
<script>
var TMDB_KEY='3a73619bbb8fc6d47742d1b5b2b707b5';
var p=new URLSearchParams(location.search),id=p.get('id'),s=p.get('s'),e=p.get('e'),sub=p.get('sub'),subLabel=p.get('sub_label')||'العربية';
var USE_DIRECT=(p.get('direct')==='1'||p.get('source')==='direct'||p.get('player')==='jw');
var MESSAGES=['Loading stream...','جاري تجهيز المشغل...','جاري الاتصال بالمصدر...','جاري تحميل الجودة المناسبة...','لحظات ويبدأ التشغيل...'];
var msgEl=document.getElementById('loader-text'),msgIdx=0,msgTimer=setInterval(()=>{msgIdx=(msgIdx+1)%MESSAGES.length;msgEl.textContent=MESSAGES[msgIdx]},1900);
var mediaInfo={title:'IPTV Expert',description:'',image:''};
var playerInstance=null;
var autoSubtitle=null;
function isTv(){return !!s}
function storageKey(){return 'iptvExpertProgress:'+id+(s?':s'+s+':e'+(e||1):'')}
function getSavedTime(){try{return Number(localStorage.getItem(storageKey())||0)||0}catch(_){return 0}}
function saveTime(t){try{if(t>5)localStorage.setItem(storageKey(),String(Math.floor(t)))}catch(_){} }
function toast(t){var el=document.getElementById('toast');el.textContent=t;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',1400)}
function showPlayer(){clearInterval(msgTimer);document.getElementById('loader').style.display='none';document.getElementById('player').style.display='block'}
function showErr(msg){clearInterval(msgTimer);document.getElementById('loader').style.display='none';document.getElementById('err').style.display='flex';document.getElementById('err-detail').textContent=msg||'';document.getElementById('err-link').href=buildVidLinkUrl(false)}
function isArabicLabel(v){v=String(v||'').toLowerCase();return v==='ar'||v.startsWith('ar-')||v.includes('arabic')||v.includes('arab')||v.includes('عرب')||v.includes('العربية')}
function normalizeTrack(t,i){
  if(!t||!t.file) return null;
  var label=t.label||t.lang||t.language||t.srclang||('Subtitle '+(i+1));
  var ar=isArabicLabel(label)||isArabicLabel(t.srclang)||isArabicLabel(t.lang)||isArabicLabel(t.language);
  return {file:t.file,label:ar?'العربية':label,kind:'captions',default:!!ar,srclang:ar?'ar':(t.srclang||t.lang||t.language||'')};
}
function normalizeTracks(list){
  var out=(Array.isArray(list)?list:[]).map(normalizeTrack).filter(Boolean);
  if(autoSubtitle&&autoSubtitle.url) out.unshift({file:autoSubtitle.url,label:'العربية',kind:'captions',default:true,srclang:'ar'});
  if(sub) out.unshift({file:sub,label:subLabel||'العربية',kind:'captions',default:true,srclang:'ar'});
  out.sort((a,b)=>Number(Boolean(b.default))-Number(Boolean(a.default)));
  if(out[0]) out[0].default=true;
  return out;
}
function inferType(rawUrl, playUrl){
  var u='';
  try{u=decodeURIComponent(rawUrl||playUrl||'').split('?')[0].toLowerCase()}catch(_){u=String(rawUrl||playUrl||'').split('?')[0].toLowerCase()}
  if(/\.m3u8?$/.test(u)||u.includes('.m3u8')) return 'hls';
  if(/\.mpd$/.test(u)||u.includes('.mpd')) return 'dash';
  if(/\.mp4$/.test(u)||u.includes('.mp4')) return 'mp4';
  if(/\.webm$/.test(u)||u.includes('.webm')) return 'webm';
  if(/\.mov$/.test(u)||u.includes('.mov')) return 'mp4';
  return '';
}
async function loadMeta(){
  if(!id) return;
  var type=isTv()?'tv':'movie';
  try{
    var r=await fetch('https://api.themoviedb.org/3/'+type+'/'+id+'?api_key='+TMDB_KEY+'&language=ar-SA');
    var d=await r.json();
    var title=d.title||d.name||'IPTV Expert';
    var year=(d.release_date||d.first_air_date||'').slice(0,4);
    var meta=[year,isTv()?'مسلسل':'فيلم',s?('S'+s+' E'+(e||1)):''].filter(Boolean).join(' • ');
    document.getElementById('title').textContent=title;
    document.getElementById('meta').textContent=meta;
    var img=d.backdrop_path||d.poster_path;
    var poster=d.poster_path?('https://image.tmdb.org/t/p/w780'+d.poster_path):'';
    var backdrop=img?('https://image.tmdb.org/t/p/w1280'+img):'';
    mediaInfo={title:title,description:d.overview||meta,image:poster||backdrop};
    if(backdrop){
      var bg=document.getElementById('loader-bg');
      var url='https://wsrv.nl/?url='+encodeURIComponent(backdrop)+'&bg=black&blur=3';
      var im=new Image();im.onload=()=>{bg.style.backgroundImage='url('+url+')';bg.style.opacity='1'};im.src=url;
    }
  }catch(_){ }
}

async function fetchArabicSubtitle(){
  try{
    var qs = new URLSearchParams({ subtitle:'1', id:id });
    if(s){ qs.set('s', s); qs.set('e', e || 1); }
    var r = await fetch('/api?' + qs.toString());
    var d = await r.json();
    if(d && d.ok && d.url){
      autoSubtitle = {
        url: new URL(d.url, location.origin).href,
        label: 'العربية',
        srclang: 'ar'
      };
      toast(d.cached ? 'تم تحميل الترجمة العربية المحفوظة' : 'تم سحب الترجمة العربية');
    } else {
      autoSubtitle = null;
      if(d && d.error) console.log('Arabic subtitle:', d.error);
    }
  }catch(err){
    autoSubtitle = null;
    console.log('Arabic subtitle fetch failed:', err && err.message);
  }
}

function buildVidLinkUrl(withProgress){
  if(!id) return '#';
  var base=isTv()?('https://vidlink.pro/tv/'+encodeURIComponent(id)+'/'+encodeURIComponent(s||1)+'/'+encodeURIComponent(e||1)):('https://vidlink.pro/movie/'+encodeURIComponent(id));
  var q=new URLSearchParams({
    primaryColor:'ca0c0c',
    secondaryColor:'2a2a2a',
    iconColor:'eefdec',
    icons:'vid',
    player:'default',
    title:'true',
    poster:'true',
    autoplay:'true',
    nextbutton:'true'
  });
  var saved=getSavedTime();
  if(withProgress && saved>8) q.set('startAt', String(saved));
  if(autoSubtitle&&autoSubtitle.url){
    q.set('sub_file', autoSubtitle.url);
    q.set('sub_label', 'العربية');
    q.set('sub_lang', 'ar');
    q.set('sub_default', 'true');
  }
  if(sub){
    q.set('sub_file', sub);
    q.set('sub_label', subLabel || 'العربية');
    q.set('sub_lang', 'ar');
    q.set('sub_default', 'true');
  }
  return base+'?'+q.toString();
}
function setupVidLink(){
  showPlayer();
  try{ if(playerInstance) playerInstance.remove(); }catch(_){ }
  document.getElementById('jwbox').style.display='none';
  document.getElementById('fallbackVideo').style.display='none';
  var frame=document.getElementById('embedFrame');
  frame.style.display='block';
  frame.src=buildVidLinkUrl(true);
  toast('VidLink Player');
}
window.addEventListener('message', function(event){
  if(event.origin !== 'https://vidlink.pro') return;
  var data = event.data || {};
  try{
    if(data.type === 'MEDIA_DATA' && data.data){
      var md=data.data;
      var watched=(md.progress && (md.progress.watched || md.progress.currentTime)) || md.currentTime || 0;
      saveTime(Number(watched)||0);
    }
    if(data.type === 'PLAYER_EVENT' && data.data){
      var ev=data.data;
      if(ev.event === 'timeupdate' || ev.event === 'pause' || ev.event === 'seeked') saveTime(Number(ev.currentTime)||0);
      if(ev.event === 'ended') try{localStorage.removeItem(storageKey())}catch(_){}
    }
  }catch(_){ }
});
async function resolveStream(){
  var r=await fetch('/api?'+(isTv()?'id='+encodeURIComponent(id)+'&s='+encodeURIComponent(s)+'&e='+encodeURIComponent(e||1):'id='+encodeURIComponent(id)));
  var d=await r.json();
  if(!r.ok||d.error) throw new Error(d.error||'API error');
  if(!d.url) throw new Error('No stream URL');
  return {playUrl:'/api?url='+encodeURIComponent(d.url),rawUrl:d.url,tracks:normalizeTracks(d.tracks),rawType:d.rawType||''};
}
function setupJW(stream){
  if(typeof window.jwplayer!=='function') throw new Error('JW Player library not loaded');
  showPlayer();
  document.getElementById('embedFrame').style.display='none';
  var src=stream.playUrl;
  var kind=inferType(stream.rawUrl,src);
  var source={file:src};
  if(kind==='hls'||kind==='dash') source.type=kind;
  else if(kind==='mp4'||kind==='webm') source.type=kind;
  playerInstance=jwplayer('jwbox');
  playerInstance.setup({
    playlist:[{title:mediaInfo.title,description:mediaInfo.description,image:mediaInfo.image,sources:[source],tracks:stream.tracks||[]}],
    width:'100%',height:'100%',autostart:true,preload:'auto',controls:true,repeat:false,stretching:'uniform',primary:'html5',
    playbackRateControls:true,cast:{},pipIcon:'enabled',skin:{name:'iptvexpert'},
    captions:{color:'#ffffff',fontSize:20,backgroundOpacity:45,edgeStyle:'dropshadow'},
    intl:{ar:{play:'تشغيل',pause:'إيقاف',fullscreen:'ملء الشاشة',settings:'الإعدادات',captions:'الترجمة',quality:'الجودة'}},
    localization:{locale:'ar'}
  });
  playerInstance.on('ready',function(){
    var t=getSavedTime();
    if(t>8){setTimeout(()=>{try{playerInstance.seek(t);toast('تم الاستكمال من '+Math.floor(t/60)+':'+String(t%60).padStart(2,'0'))}catch(_){ }},900)}
    try{document.querySelector('#jwbox').classList.add('jw-skin-iptvexpert')}catch(_){ }
  });
  playerInstance.on('captionsList',function(ev){try{var list=ev.tracks||[];var arIndex=list.findIndex(function(x){return isArabicLabel(x.label)||isArabicLabel(x.language)||isArabicLabel(x.srclang)});if(arIndex>=0)setTimeout(function(){try{playerInstance.setCurrentCaptions(arIndex)}catch(_){ }},500)}catch(_){ }});
  playerInstance.on('time',function(ev){saveTime(ev.position||0)});
  playerInstance.on('complete',function(){try{localStorage.removeItem(storageKey())}catch(_){}});
  playerInstance.on('error',function(ev){fallbackNative(stream.playUrl,'JW error: '+(ev.message||ev.code||''))});
  playerInstance.on('setupError',function(ev){fallbackNative(stream.playUrl,'JW setup error: '+(ev.message||''))});
}
function fallbackNative(src,reason){
  try{if(playerInstance)playerInstance.remove()}catch(_){ }
  var box=document.getElementById('jwbox'); box.style.display='none';
  var v=document.getElementById('fallbackVideo'); v.style.display='block';
  toast('تشغيل احتياطي');
  if(window.Hls&&Hls.isSupported()){
    var hls=new Hls({enableWorker:true});hls.loadSource(src);hls.attachMedia(v);hls.on(Hls.Events.MANIFEST_PARSED,()=>{showPlayer();var t=getSavedTime();if(t>8)v.currentTime=t;v.play().catch(()=>{})});hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal)showErr(reason+' / '+(d.details||'HLS fatal'))});
  }else{v.src=src;showPlayer();var t=getSavedTime();v.addEventListener('loadedmetadata',()=>{if(t>8)v.currentTime=t},{once:true});v.play().catch(()=>{})}
  v.addEventListener('timeupdate',()=>saveTime(v.currentTime));
  v.addEventListener('ended',()=>{try{localStorage.removeItem(storageKey())}catch(_){}})
}
(async function(){
  if(!id){clearInterval(msgTimer);document.getElementById('loader').style.display='none';document.getElementById('usage').style.display='flex';return}
  try{
    await loadMeta();
    await fetchArabicSubtitle();
    if(USE_DIRECT){ var stream=await resolveStream(); setupJW(stream); }
    else setupVidLink();
  }catch(err){showErr(err.message)}
})();
</script>
</body>
</html>

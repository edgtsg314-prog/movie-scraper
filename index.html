<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>IPTV Expert Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;background:#000;color:#fff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}#app{position:fixed;inset:0;background:#000}#backdrop{position:fixed;inset:0;background:#111 center/cover no-repeat;opacity:.35;filter:blur(3px) saturate(1.1);transform:scale(1.03);transition:.4s}#shade{position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.78),rgba(0,0,0,.08) 26%,rgba(0,0,0,.1) 62%,rgba(0,0,0,.86));pointer-events:none}.topbar{position:fixed;z-index:20;top:0;left:0;right:0;height:96px;display:flex;align-items:flex-start;justify-content:center;padding:22px 86px;background:linear-gradient(180deg,rgba(0,0,0,.82),rgba(0,0,0,0));transition:.25s}.title{text-align:center;text-shadow:0 2px 16px #000}.title h1{font-size:clamp(22px,3vw,34px);font-weight:900;line-height:1.1}.title p{margin-top:8px;color:#ddd;font-weight:700;font-size:14px}.back{position:fixed;z-index:30;top:24px;left:24px;width:52px;height:52px;border-radius:50%;background:rgba(15,15,15,.72);border:1px solid rgba(255,255,255,.14);display:grid;place-items:center;font-size:24px;backdrop-filter:blur(14px)}#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}video{width:100%;height:100%;object-fit:contain;background:#000}video::cue{font-size:160%;line-height:1.25;color:#fff;background:rgba(0,0,0,.62);text-shadow:0 2px 6px #000}.loader{position:fixed;z-index:40;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;background:rgba(0,0,0,.6)}.spin{width:64px;height:64px;border-radius:50%;border:5px solid rgba(255,255,255,.15);border-top-color:#e50914;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loader small{color:#bbb}.center-controls{position:fixed;z-index:22;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:26px;transition:.2s}.bigplay{width:92px;height:92px;border-radius:50%;background:#e50914;box-shadow:0 12px 50px rgba(229,9,20,.45);display:grid;place-items:center;font-size:34px}.skip{width:64px;height:64px;border-radius:50%;background:rgba(0,0,0,.62);border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;font-weight:900}.controls{position:fixed;z-index:24;left:0;right:0;bottom:0;padding:0 28px 26px;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,.92));transition:.25s}.progress-wrap{height:24px;display:flex;align-items:center}.progress{position:relative;width:100%;height:5px;border-radius:999px;background:rgba(255,255,255,.34);cursor:pointer}.buffer{position:absolute;inset:0 auto 0 0;width:0;background:rgba(255,255,255,.45);border-radius:999px}.bar{position:absolute;inset:0 auto 0 0;width:0;background:#e50914;border-radius:999px}.knob{position:absolute;top:50%;left:0;width:18px;height:18px;border-radius:50%;background:#e50914;transform:translate(-50%,-50%);box-shadow:0 0 18px rgba(229,9,20,.8)}.row{height:54px;display:flex;align-items:center;justify-content:space-between;gap:18px}.left,.right{display:flex;align-items:center;gap:13px}.ctrl{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);font-size:20px}.ctrl:hover{background:rgba(255,255,255,.16)}.time{direction:ltr;color:#eee;font-weight:800;min-width:128px;text-align:left}.vol{direction:ltr;width:118px;accent-color:#e50914}.pill{border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.12);font-size:13px;font-weight:900}.cc.active{background:#e50914}.menu{position:fixed;z-index:50;right:22px;bottom:92px;width:min(330px,calc(100vw - 44px));background:rgba(12,12,12,.96);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px;box-shadow:0 22px 70px rgba(0,0,0,.6);display:none;backdrop-filter:blur(18px)}.menu.show{display:block}.menu h3{font-size:15px;margin:4px 4px 12px;color:#fff}.item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;border-radius:12px;color:#ddd}.item:hover,.item.active{background:rgba(229,9,20,.18);color:#fff}.err{position:fixed;z-index:60;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#050505;text-align:center;padding:28px}.err h2{font-size:28px}.err pre{max-width:900px;white-space:pre-wrap;color:#bbb;direction:ltr;text-align:left;background:#111;border:1px solid #333;padding:14px;border-radius:12px}.hidden-ui .controls,.hidden-ui .topbar,.hidden-ui .back,.hidden-ui .center-controls{opacity:0;pointer-events:none}@media(max-width:700px){.topbar{height:80px;padding:18px 70px}.back{top:18px;left:16px;width:46px;height:46px}.controls{padding:0 14px 18px}.row{height:48px}.ctrl{width:40px;height:40px}.bigplay{width:76px;height:76px}.skip{width:54px;height:54px}.vol{display:none}.time{font-size:12px;min-width:94px}.title h1{font-size:22px}}

video::cue{background:rgba(0,0,0,.72);color:#fff;font-size:22px;line-height:1.35;text-shadow:0 2px 8px #000;padding:4px 8px}
video::cue(b){font-weight:800}
@media(max-width:700px){video::cue{font-size:18px}}

#subtitleOverlay{position:fixed;z-index:23;left:50%;bottom:118px;transform:translateX(-50%);max-width:min(88vw,1100px);padding:8px 14px;border-radius:8px;background:rgba(0,0,0,.62);color:#fff;text-align:center;font-size:clamp(20px,3vw,34px);font-weight:700;line-height:1.45;text-shadow:0 2px 8px #000;direction:rtl;unicode-bidi:plaintext;display:none;white-space:pre-wrap;pointer-events:none}.hidden-ui #subtitleOverlay{bottom:48px}@media(max-width:700px){#subtitleOverlay{bottom:96px;font-size:22px;max-width:94vw}}
</style>
</head>
<body>
<div id="app">
  <div id="backdrop"></div><div id="shade"></div>
  <button class="back" onclick="history.back()">‹</button>
  <div class="topbar"><div class="title"><h1 id="name">IPTV Expert</h1><p id="meta"></p></div></div>
  <div id="stage"><video id="video" playsinline preload="auto" crossorigin="anonymous"></video></div><div id="subtitleOverlay"></div>
  <div id="loader" class="loader"><div class="spin"></div><small id="loadtext">جاري تجهيز التشغيل...</small></div>
  <div class="center-controls" id="centerControls"><button class="skip" id="rew">↶ 10</button><button class="bigplay" id="big">▶</button><button class="skip" id="fwd">10 ↷</button></div>
  <div class="controls" id="controls">
    <div class="progress-wrap"><div class="progress" id="progress"><div class="buffer" id="buffer"></div><div class="bar" id="bar"></div><div class="knob" id="knob"></div></div></div>
    <div class="row"><div class="left"><button class="ctrl" id="play">▶</button><button class="ctrl" id="mute">🔊</button><input class="vol" id="vol" type="range" min="0" max="1" step="0.01" value="1"><span class="time" id="time">0:00 / 0:00</span></div><div class="right"><button class="pill" id="quality">Auto</button><button class="pill cc" id="cc">CC</button><button class="ctrl" id="settings">⚙</button><button class="ctrl" id="pip">▣</button><button class="ctrl" id="full">⛶</button></div></div>
  </div>
  <div class="menu" id="menu"><h3>الإعدادات</h3><div id="menuItems"></div></div>
  <div class="err" id="err"><h2>تعذر التشغيل</h2><p>جرّب لاحقًا أو جرّب رابطًا آخر.</p><pre id="errDetail"></pre></div>
</div>
<script>
const TMDB_KEY='3a73619bbb8fc6d47742d1b5b2b707b5';
const p=new URLSearchParams(location.search);const id=p.get('id'),s=p.get('s'),e=p.get('e')||'1';
const v=document.getElementById('video'),loader=document.getElementById('loader'),app=document.getElementById('app');
const nameEl=document.getElementById('name'),metaEl=document.getElementById('meta'),backdrop=document.getElementById('backdrop');
const playBtn=document.getElementById('play'),big=document.getElementById('big'),rew=document.getElementById('rew'),fwd=document.getElementById('fwd'),mute=document.getElementById('mute'),vol=document.getElementById('vol');
const progress=document.getElementById('progress'),bar=document.getElementById('bar'),buffer=document.getElementById('buffer'),knob=document.getElementById('knob'),timeEl=document.getElementById('time');
const settings=document.getElementById('settings'),menu=document.getElementById('menu'),menuItems=document.getElementById('menuItems'),qualityBtn=document.getElementById('quality'),ccBtn=document.getElementById('cc'),pip=document.getElementById('pip'),full=document.getElementById('full');
let hls=null,levels=[],hideTimer=null,subtitleBlob=null,arabicTrack=null,arabicCues=[],arabicEnabled=false,subtitleOptions=[],selectedSubtitleChoice=0,subtitleOffset=0,currentSubtitleLabel='العربية';
const subtitleOverlay=document.getElementById('subtitleOverlay');
const isTv=!!s; const storageKey='iptv-progress-'+(isTv?'tv-'+id+'-'+s+'-'+e:'movie-'+id); selectedSubtitleChoice=Number(localStorage.getItem(storageKey+'-sub-choice')||0); subtitleOffset=Number(localStorage.getItem(storageKey+'-sub-offset')||0);
function fmt(t){t=Math.max(0,Math.floor(t||0));let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),sec=t%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`}
function showErr(msg){loader.style.display='none';document.getElementById('err').style.display='flex';document.getElementById('errDetail').textContent=msg||''}
function setVisible(){app.classList.remove('hidden-ui');clearTimeout(hideTimer);hideTimer=setTimeout(()=>{if(!v.paused)app.classList.add('hidden-ui')},2800)}
['mousemove','touchstart','keydown'].forEach(ev=>addEventListener(ev,setVisible,{passive:true}));
async function loadMeta(){if(!id)return;try{let type=isTv?'tv':'movie';let r=await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_KEY}&language=ar-SA`);let d=await r.json();nameEl.textContent=d.title||d.name||'IPTV Expert';metaEl.textContent=(d.release_date||d.first_air_date||'').slice(0,4)+(isTv?` · موسم ${s} · حلقة ${e}`:' · فيلم');let img=d.backdrop_path||d.poster_path;if(img)backdrop.style.backgroundImage=`url(https://image.tmdb.org/t/p/original${img})`}catch(_){}}

function parseVttCues(vtt){
  const toSec=(t)=>{
    const m=String(t).trim().match(/(?:(\d+):)?(\d{2}):(\d{2})\.(\d{1,3})/);
    if(!m)return 0;
    return (Number(m[1]||0)*3600)+(Number(m[2])*60)+Number(m[3])+(Number(String(m[4]).padEnd(3,'0'))/1000);
  };
  const clean=(x)=>String(x||'').replace(/<[^>]+>/g,'').replace(/\{[^}]+\}/g,'').trim();
  const blocks=String(vtt||'').replace(/\r/g,'').split(/\n\n+/);
  const cues=[];
  for(const block of blocks){
    const lines=block.split('\n').map(x=>x.trim()).filter(Boolean);
    if(!lines.length||/^WEBVTT/i.test(lines[0])) continue;
    let timeIndex=lines.findIndex(l=>/-->/.test(l));
    if(timeIndex<0) continue;
    const [a,bRaw]=lines[timeIndex].split('-->');
    const b=String(bRaw||'').trim().split(/\s+/)[0];
    const text=clean(lines.slice(timeIndex+1).join('\n'));
    if(text) cues.push({start:toSec(a),end:toSec(b),text});
  }
  return cues.sort((a,b)=>a.start-b.start);
}
function updateSubtitleOverlay(){
  if(!arabicEnabled||!arabicCues.length){subtitleOverlay.style.display='none';subtitleOverlay.textContent='';return;}
  const t=(v.currentTime||0)+subtitleOffset;
  const cue=arabicCues.find(c=>t>=c.start&&t<=c.end);
  if(cue){subtitleOverlay.textContent=cue.text;subtitleOverlay.style.display='block';}
  else {subtitleOverlay.style.display='none';subtitleOverlay.textContent='';}
}
function enableArabicSubtitle(on=true){
  arabicEnabled=!!on;
  try{for(const t of v.textTracks)t.mode='disabled'}catch(_){ }
  ccBtn.classList.toggle('active',arabicEnabled);
  updateSubtitleOverlay();
}
async function loadSubtitleOptions(){
  try{
    const url=`/api?subtitle_list=1&id=${encodeURIComponent(id)}${isTv?`&s=${encodeURIComponent(s)}&e=${encodeURIComponent(e)}`:''}`;
    const r=await fetch(url,{cache:'no-store'});
    const d=await r.json().catch(()=>null);
    subtitleOptions=(d&&d.ok&&Array.isArray(d.subtitles))?d.subtitles:[];
    if(selectedSubtitleChoice<0||selectedSubtitleChoice>=subtitleOptions.length) selectedSubtitleChoice=0;
    return subtitleOptions;
  }catch(err){
    console.warn('Arabic subtitle list failed', err);
    subtitleOptions=[];
    return [];
  }
}
async function fetchArabicSubtitle(choice=selectedSubtitleChoice){
  try{
    if(!subtitleOptions.length) await loadSubtitleOptions();
    if(!subtitleOptions.length){
      console.warn('No Arabic subtitle candidates');
      return false;
    }
    selectedSubtitleChoice=Number(choice||0);
    localStorage.setItem(storageKey+'-sub-choice',String(selectedSubtitleChoice));
    currentSubtitleLabel=subtitleOptions[selectedSubtitleChoice]?.label||'العربية';
    const url=`/api?subtitle=1&id=${encodeURIComponent(id)}${isTv?`&s=${encodeURIComponent(s)}&e=${encodeURIComponent(e)}`:''}&choice=${encodeURIComponent(selectedSubtitleChoice)}&force=1`;
    const r=await fetch(url,{cache:'no-store'});
    const ct=(r.headers.get('content-type')||'').toLowerCase();
    if(!r.ok||!ct.includes('text/vtt')){
      console.warn('Arabic subtitle not available', r.status, await r.text().catch(()=>''));
      return false;
    }
    let text=await r.text();
    if(!text.trim().startsWith('WEBVTT')) text='WEBVTT\n\n'+text;
    // Ensure the VTT is clean enough for browser TextTrack parser.
    const firstCue=text.search(/\d{1,2}:\d{2}:\d{2}\.\d{3}\s*-->/);
    if(firstCue>0) text='WEBVTT\n\n'+text.slice(firstCue);
    arabicCues=parseVttCues(text);
    if(arabicCues.length){ enableArabicSubtitle(true); }
    subtitleBlob=URL.createObjectURL(new Blob([text],{type:'text/vtt'}));

    // remove old tracks to prevent browser choosing English/cached captions
    [...v.querySelectorAll('track')].forEach(t=>t.remove());
    const track=document.createElement('track');
    track.kind='subtitles';
    track.label='العربية';
    track.srclang='ar';
    track.src=subtitleBlob;
    track.default=true;
    v.appendChild(track);
    arabicTrack=track;

    const enableArabic=()=>{ enableArabicSubtitle(true); };
    track.addEventListener('load',enableArabic,{once:true});
    // Safari/Chrome sometimes fires the load event before listener is attached with blob tracks.
    setTimeout(enableArabic,700);
    return true;
  }catch(err){
    console.warn('Arabic subtitle failed', err);
    return false;
  }
}
async function start(){if(!id){showErr('استخدم ?id=550 أو ?id=456&s=1&e=1');return}await loadMeta();await fetchArabicSubtitle();try{const r=await fetch(`/api?id=${encodeURIComponent(id)}${isTv?`&s=${encodeURIComponent(s)}&e=${encodeURIComponent(e)}`:''}`);const d=await r.json();if(d.error)throw new Error(d.error);playStream(d.url)}catch(err){showErr(err.message)}}
function playStream(raw){const src='/api?url='+encodeURIComponent(raw);if(Hls.isSupported()){hls=new Hls({enableWorker:true,lowLatencyMode:false});hls.loadSource(src);hls.attachMedia(v);hls.on(Hls.Events.MANIFEST_PARSED,()=>{levels=hls.levels||[];loader.style.display='none';restoreProgress();v.play().catch(()=>{});renderQualityMenu()});hls.on(Hls.Events.ERROR,(_,data)=>{console.warn('HLS error',data);if(data.fatal)showErr(data.details||'HLS error')})}else if(v.canPlayType('application/vnd.apple.mpegurl')){v.src=src;v.addEventListener('loadedmetadata',()=>{loader.style.display='none';restoreProgress();v.play().catch(()=>{})},{once:true})}else showErr('المتصفح لا يدعم HLS')}
function restoreProgress(){let t=Number(localStorage.getItem(storageKey)||0);if(t>20&&isFinite(t))v.currentTime=t}
setInterval(()=>{if(v.currentTime>5)localStorage.setItem(storageKey,String(v.currentTime))},2500);
function sync(){let d=v.duration||0,c=v.currentTime||0,pct=d?c/d*100:0;bar.style.width=pct+'%';knob.style.left=pct+'%';timeEl.textContent=fmt(c)+' / '+fmt(d);updateSubtitleOverlay();try{if(v.buffered.length&&d){let b=v.buffered.end(v.buffered.length-1)/d*100;buffer.style.width=Math.min(100,b)+'%'}}catch(_){}}
v.addEventListener('timeupdate',sync);v.addEventListener('durationchange',sync);v.addEventListener('play',()=>{playBtn.textContent='❚❚';big.textContent='❚❚';setVisible()});v.addEventListener('pause',()=>{playBtn.textContent='▶';big.textContent='▶';setVisible()});
function toggle(){v.paused?v.play().catch(()=>{}):v.pause()}playBtn.onclick=big.onclick=toggle;rew.onclick=()=>v.currentTime=Math.max(0,v.currentTime-10);fwd.onclick=()=>v.currentTime=Math.min(v.duration||Infinity,v.currentTime+10);mute.onclick=()=>{v.muted=!v.muted;mute.textContent=v.muted?'🔇':'🔊'};vol.oninput=()=>{v.volume=Number(vol.value);v.muted=v.volume===0};progress.onclick=(ev)=>{const r=progress.getBoundingClientRect();v.currentTime=((ev.clientX-r.left)/r.width)*(v.duration||0)};full.onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();pip.onclick=()=>document.pictureInPictureElement?document.exitPictureInPicture():v.requestPictureInPicture&&v.requestPictureInPicture();
ccBtn.onclick=()=>{ if(!arabicCues.length)return; enableArabicSubtitle(!arabicEnabled); };
settings.onclick=()=>{menu.classList.toggle('show');renderMainMenu()};
function renderMainMenu(){menuItems.innerHTML='';addItem('جودة الفيديو','Auto',renderQualityMenu);addItem('سرعة التشغيل',v.playbackRate+'x',renderSpeedMenu);addItem('الترجمة',ccBtn.classList.contains('active')?('العربية '+(subtitleOffset?subtitleOffset.toFixed(1)+'ث':'')):'إيقاف',renderSubtitleMenu)}
function addItem(a,b,fn,active){let div=document.createElement('button');div.className='item'+(active?' active':'');div.innerHTML=`<span>${a}</span><b>${b||''}</b>`;div.onclick=fn;menuItems.appendChild(div)}
function renderQualityMenu(){menuItems.innerHTML='';addItem('تلقائي','',()=>{if(hls)hls.currentLevel=-1;qualityBtn.textContent='Auto';menu.classList.remove('show')},hls&&hls.currentLevel===-1);(levels||[]).forEach((l,i)=>addItem((l.height?l.height+'p':'Quality '+(i+1)),'',()=>{hls.currentLevel=i;qualityBtn.textContent=l.height?l.height+'p':'Q'+(i+1);menu.classList.remove('show')},hls&&hls.currentLevel===i))}
function renderSpeedMenu(){menuItems.innerHTML='';[0.75,1,1.25,1.5,2].forEach(x=>addItem(x+'x','',()=>{v.playbackRate=x;menu.classList.remove('show')},v.playbackRate===x))}
function renderSubtitleMenu(){
  menuItems.innerHTML='';
  addItem('إيقاف','',()=>{enableArabicSubtitle(false);menu.classList.remove('show')},!arabicEnabled);
  if(!subtitleOptions.length){addItem('العربية','غير متوفرة',()=>{});return;}
  subtitleOptions.slice(0,8).forEach((opt,i)=>{
    const label=(i===0?'الأفضل · ':'')+(opt.label||('العربية '+(i+1)));
    addItem(label, i===selectedSubtitleChoice?'مفعّلة':'', async()=>{
      loader.style.display='flex';
      await fetchArabicSubtitle(i);
      loader.style.display='none';
      enableArabicSubtitle(true);
      menu.classList.remove('show');
    }, arabicEnabled&&i===selectedSubtitleChoice);
  });
  addItem('تأخير الترجمة 0.5ث','',()=>{subtitleOffset-=0.5;localStorage.setItem(storageKey+'-sub-offset',String(subtitleOffset));renderSubtitleMenu();},false);
  addItem('تقديم الترجمة 0.5ث','',()=>{subtitleOffset+=0.5;localStorage.setItem(storageKey+'-sub-offset',String(subtitleOffset));renderSubtitleMenu();},false);
  addItem('إعادة ضبط التزامن',subtitleOffset.toFixed(1)+'ث',()=>{subtitleOffset=0;localStorage.setItem(storageKey+'-sub-offset','0');renderSubtitleMenu();},subtitleOffset===0);
}
addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();toggle()}if(e.code==='ArrowLeft')v.currentTime-=10;if(e.code==='ArrowRight')v.currentTime+=10;if(e.code==='KeyF')full.click();if(e.code==='KeyM')mute.click()});
start();
</script>
</body>
</html>

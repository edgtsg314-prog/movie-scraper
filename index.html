<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VidLink Stream</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;background:#000;color:#fff;font-family:system-ui,Tahoma,Arial;overflow:hidden}.wrap{position:fixed;inset:0;background:#000}.player{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}.usage,.err{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;gap:14px;background:#000;padding:24px}.usage code{direction:ltr;display:block;background:#151515;border:1px solid #2a2a2a;border-radius:10px;padding:10px 14px;margin:8px;color:#eee}.err h1{font-size:32px}.err p{color:#aaa;direction:ltr}.open{color:#60a5fa;text-decoration:underline;direction:ltr}
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>
<div class="usage" id="usage">
  <h2>طريقة الاستخدام</h2>
  <code>?id=786892</code>
  <code>?id=94997&s=1&e=1</code>
</div>
<div class="err" id="err">
  <h1>تعذر فتح المشغل</h1>
  <p id="errText"></p>
  <a class="open" id="openLink" target="_blank" rel="noopener">فتح الرابط مباشرة</a>
</div>
<script>
(function(){
  var p = new URLSearchParams(location.search);
  var id = p.get('id') || p.get('tmdb');
  var s = p.get('s') || p.get('season');
  var e = p.get('e') || p.get('episode') || '1';

  if(!id){
    document.getElementById('usage').style.display='flex';
    return;
  }

  // VidLink official embed routes:
  // Movie: https://vidlink.pro/movie/{tmdbId}
  // TV:    https://vidlink.pro/tv/{tmdbId}/{season}/{episode}
  var base = s ? ('https://vidlink.pro/tv/' + encodeURIComponent(id) + '/' + encodeURIComponent(s) + '/' + encodeURIComponent(e))
               : ('https://vidlink.pro/movie/' + encodeURIComponent(id));

  var params = new URLSearchParams();
  params.set('primaryColor', p.get('primaryColor') || 'B20710');
  params.set('secondaryColor', p.get('secondaryColor') || '170000');
  params.set('iconColor', p.get('iconColor') || 'ffffff');
  params.set('icons', p.get('icons') || 'default');
  params.set('player', p.get('player') || 'default');
  params.set('title', p.get('title') || 'true');
  params.set('poster', p.get('poster') || 'true');
  params.set('autoplay', p.get('autoplay') || 'false');
  params.set('nextbutton', p.get('nextbutton') || (s ? 'true' : 'false'));
  if(p.get('startAt')) params.set('startAt', p.get('startAt'));

  var src = base + '?' + params.toString();
  document.getElementById('openLink').href = src;

  var iframe = document.createElement('iframe');
  iframe.className = 'player';
  iframe.src = src;
  iframe.allow = 'autoplay; fullscreen; picture-in-picture; encrypted-media';
  iframe.allowFullscreen = true;
  iframe.referrerPolicy = 'origin';
  iframe.onerror = function(){
    document.getElementById('errText').textContent = src;
    document.getElementById('err').style.display='flex';
  };
  document.getElementById('wrap').appendChild(iframe);

  // Progress listener from VidLink docs.
  window.addEventListener('message', function(event){
    if(event.origin !== 'https://vidlink.pro') return;
    if(event.data && event.data.type === 'MEDIA_DATA'){
      localStorage.setItem('vidLinkProgress', JSON.stringify(event.data.data));
    }
  });
})();
</script>
</body>
</html>

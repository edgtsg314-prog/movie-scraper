<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Movies & TV</title>
    <style>
        body { 
            background-color: #0c0c0c; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
        }
        .wrapper { max-width: 1000px; margin: 0 auto; }
        .player-container { 
            position: relative; 
            padding-bottom: 56.25%; /* أبعاد الشاشة 16:9 */
            height: 0; 
            overflow: hidden; 
            background: #000; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            margin-top: 20px; 
        }
        .player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        #loading { color: #63b8bc; font-size: 18px; margin-top: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div id="loading">جاري تهيئة مشغل الفيديو العصري...</div>
        <div class="player-container" id="player-box" style="display: none;">
            <!-- مشغل فيديو VidLink الرسمي بالألوان الزرقاء التي اخترتها وبدون إعلانات -->
            <iframe id="secure-player" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <script>
        // قراءة المعرفات تلقائياً من الرابط (?id=1280738)
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');
        const season = urlParams.get('s') || "";
        const episode = urlParams.get('e') || "";

        if (!movieId) {
            document.getElementById('loading').innerText = "تنبيه: يرجى تحديد معرف العمل في الرابط (مثال: ?id=1280738)";
        } else {
            startDirectPlayer();
        }

        function startDirectPlayer() {
            // بناء الرابط المباشر للمشغل الرسمي بناءً على نوع العمل ليتخطى حظر السيرفرات
            let targetPlayerUrl = season 
                ? `https://vidlink.pro{movieId}/${season}/${episode}`
                : `https://vidlink.pro{movieId}`;

            // حقن بارامترات الألوان المخصصة (الأزرق) وزر الحلقة التالية والترجمة التلقائية من التوثيق الرسمي
            targetPlayerUrl += `?primaryColor=63b8bc&secondaryColor=a2a2a2&iconColor=eefdec&icons=vid&title=true&poster=true&nextbutton=true`;

            // وضع الرابط في الـ iframe وتشغيله فوراً وبسرعة فائقة
            const playerIframe = document.getElementById('secure-player');
            playerIframe.src = targetPlayerUrl;

            // إخفاء كلمة التحميل وعرض واجهة المشغل فورا
            document.getElementById('loading').style.display = 'none';
            document.getElementById('player-box').style.display = 'block';
        }
    </script>
</body>
</html>

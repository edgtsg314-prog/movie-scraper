<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }

#loader {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 28px; background: #000; z-index: 10;
}
#loader-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: opacity .6s ease; opacity: 0;
}
.spinner {
  position: relative; z-index: 1;
  width: 72px; height: 72px;
  border: 5px solid rgba(255,255,255,.15);
  border-top-color: #3b82f6; border-radius: 50%; /* تلوين حلقة التحميل */
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader-text { position: relative; z-index: 1; font-size: .95rem; color: rgba(255,255,255,.6); letter-spacing: .04em; text-shadow: 0 1px 4px #000; }

#player { position: fixed; inset: 0; display: none; background: #000; z-index: 5; }
iframe { width: 100%; height: 100%; display: block; border: 0; }

#usage {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  background: #000; gap: 10px; z-index: 20;
}
#usage p { font-size: 1.05rem; color: rgba(255,255,255,.65); line-height: 2; }
</style>
</head>
<body>

<div id="loader">
  <div id="loader-bg"></div>
  <div class="spinner"></div>
  <div id="loader-text">Loading stream...</div>
</div>

<div id="usage">
  <p>
    <span style="color:#fff;font-size:1.2rem">Stream</span><br><br>
    <code style="color:rgba(255,255,255,.8)">?id=550</code> &nbsp;— movie<br>
    <code style="color:rgba(255,255,255,.8)">?id=456&amp;s=1&amp;e=1</code> &nbsp;— TV episode
  </p>
</div>

<div id="player">
  <!-- المشغل البديل والمستقر vidsrc -->
  <iframe id="v" allowfullscreen allow="autoplay; encrypted-media"></iframe>
</div>

<script>
var TMDB_KEY = '3a73619bbb8fc6d47742d1b5b2b707b5';

var p = new URLSearchParams(location.search);
var id = p.get('id'), s = p.get('s'), e = p.get('e');

function showPlayer() {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('player').style.display = 'block';
}

function loadBackdrop(id, isTv) {
  var type = isTv ? 'tv' : 'movie';
  fetch('https://themoviedb.org' + type + '/' + id + '?api_key=' + TMDB_KEY)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var img = d.backdrop_path || d.poster_path;
      if (!img) return;
      var url = 'https://wsrv.nl' + encodeURIComponent('https://tmdb.org' + img) + '&bg=black&blur=3';
      var bg = document.getElementById('loader-bg');
      var preload = new Image();
      preload.onload = function() { bg.style.backgroundImage = 'url(' + url + ')'; bg.style.opacity = '1'; };
      preload.src = url;
    })
    .catch(function() {});
}

if (!id) {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('usage').style.display = 'flex';
} else {
  loadBackdrop(id, !!s);
  
  // بناء مسار السيرفر البديل المستقر حلياً لتخطي توقف ونقص الـ DNS في السيرفر الأول
  var targetUrl = s 
      ? 'https://vidsrc.xyz' + id + '&season=' + s + '&episode=' + (e || '1')
      : 'https://vidsrc.xyz' + id;

  const iframe = document.getElementById('v');
  iframe.src = targetUrl;

  // تشغيل واجهة العرض فور انتهاء تحميل مشغل vidsrc المستقر
  iframe.onload = function() {
      showPlayer();
  };
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;background:#000;color:#fff;font-family:system-ui,sans-serif;overflow:hidden}#wrap{position:fixed;inset:0;background:#000}iframe{width:100%;height:100%;border:0;display:block;background:#000}#usage,#err{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;background:#000;gap:14px}code{color:#ddd}#err-title{font-size:2.1rem;font-weight:700}#err-detail{color:rgba(255,255,255,.55);font-size:.9rem}
</style>
</head>
<body>
<div id="wrap"></div>
<div id="usage">
  <p><b>Stream</b><br><br><code>?id=550</code> movie<br><code>?id=456&s=1&e=1</code> TV episode</p>
</div>
<div id="err"><div id="err-title">Error Occurred</div><div id="err-detail"></div></div>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  var id=p.get('id'), s=p.get('s'), e=p.get('e') || '1';
  if(!id){ document.getElementById('usage').style.display='flex'; return; }

  // VidLink official player URLs:
  // movie: https://vidlink.pro/movie/{tmdbId}
  // tv:    https://vidlink.pro/tv/{tmdbId}/{season}/{episode}
  var src = s
    ? 'https://vidlink.pro/tv/' + encodeURIComponent(id) + '/' + encodeURIComponent(s) + '/' + encodeURIComponent(e)
    : 'https://vidlink.pro/movie/' + encodeURIComponent(id);

  var iframe=document.createElement('iframe');
  iframe.src=src;
  iframe.allow='fullscreen; autoplay; encrypted-media; picture-in-picture';
  iframe.referrerPolicy='origin';
  iframe.allowFullscreen=true;
  // AdShield: يمنع فتح نوافذ/تبويبات وإعادة توجيه الصفحة من داخل مشغل خارجي
  // لا نضيف allow-popups ولا allow-top-navigation حتى لا تظهر إعلانات منبثقة.
  iframe.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-presentation');
  document.getElementById('wrap').appendChild(iframe);
})();
</script>
</body>
</html>
